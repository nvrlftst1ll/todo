<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo лист с JSON</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .todo-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        #taskInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        #taskInput:focus {
            border-color: #6c63ff;
        }
        #addBtn {
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 600;
        }
        #addBtn:hover {
            background: #5a52d5;
        }
        .task-list {
            list-style: none;
            margin-bottom: 25px;
            max-height: 400px;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            border-radius: 30px;
            padding: 8px 15px;
            margin-bottom: 10px;
            transition: box-shadow 0.3s;
        }
        .task-item:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .task-item .checkbox {
            margin-right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .task-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            word-break: break-word;
            padding-right: 10px;
        }
        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #ff6b6b;
            padding: 0 5px;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        .delete-btn:hover {
            color: #ff3838;
            background-color: rgba(255,107,107,0.1);
        }
        .empty-message {
            text-align: center;
            color: #aaa;
            font-style: italic;
            margin-bottom: 20px;
        }
        .json-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .json-btn {
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            flex: 1 1 auto;
            min-width: 140px;
        }
        .json-btn:hover {
            background: #2d3748;
        }
        #importFile {
            display: none;
        }
        .import-label {
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            text-align: center;
            flex: 1 1 auto;
            min-width: 140px;
        }
        .import-label:hover {
            background: #2d3748;
        }
    </style>
</head>
<body>
    <div class="todo-container">
        <h1>Мои задачи</h1>
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Введите новую задачу..." autofocus>
            <button id="addBtn">Добавить</button>
        </div>
        <ul class="task-list" id="taskList">
            <!-- Сюда будут добавляться задачи -->
        </ul>
        <div class="empty-message" id="emptyMessage">Список задач пуст</div>

        <div class="json-buttons">
            <button id="exportJson" class="json-btn">📥 Экспорт в JSON</button>
            <label for="importFile" class="import-label">📤 Импорт из JSON</label>
            <input type="file" id="importFile" accept=".json,application/json">
        </div>
    </div>

    <script>
        // Получаем элементы
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const emptyMessage = document.getElementById('emptyMessage');
        const exportBtn = document.getElementById('exportJson');
        const importFile = document.getElementById('importFile');

        // Функция для проверки и обновления отображения пустого списка
        function updateEmptyMessage() {
            emptyMessage.style.display = taskList.children.length === 0 ? 'block' : 'none';
        }

        // Функция создания элемента задачи (без добавления в DOM)
        function createTaskElement(taskText, completed = false) {
            const li = document.createElement('li');
            li.className = 'task-item';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox';
            checkbox.checked = completed;

            const span = document.createElement('span');
            span.className = 'task-text' + (completed ? ' completed' : '');
            span.textContent = taskText;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.setAttribute('aria-label', 'Удалить задачу');

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);

            return li;
        }

        // Функция добавления новой задачи (из поля ввода)
        function addTaskFromInput() {
            const text = taskInput.value.trim();
            if (text === '') {
                alert('Введите текст задачи!');
                return;
            }
            const li = createTaskElement(text, false);
            taskList.appendChild(li);
            taskInput.value = '';
            taskInput.focus();
            updateEmptyMessage();
        }

        // Обработчик нажатия на кнопку "Добавить"
        addBtn.addEventListener('click', addTaskFromInput);

        // Обработчик нажатия Enter в поле ввода
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addBtn.click();
            }
        });

        // Делегирование событий для списка задач (отметка и удаление)
        taskList.addEventListener('change', (e) => {
            if (e.target.classList.contains('checkbox')) {
                const span = e.target.nextElementSibling;
                if (span && span.classList.contains('task-text')) {
                    span.classList.toggle('completed', e.target.checked);
                }
            }
        });

        taskList.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) {
                const li = e.target.closest('.task-item');
                if (li) {
                    li.remove();
                    updateEmptyMessage();
                }
            }
        });

        // Экспорт в JSON
        exportBtn.addEventListener('click', () => {
            const tasks = [];
            const items = taskList.querySelectorAll('.task-item');
            items.forEach(item => {
                const checkbox = item.querySelector('.checkbox');
                const textSpan = item.querySelector('.task-text');
                tasks.push({
                    text: textSpan.textContent,
                    completed: checkbox.checked
                });
            });

            const json = JSON.stringify(tasks, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tasks_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Импорт из JSON
        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const tasks = JSON.parse(event.target.result);
                    if (!Array.isArray(tasks)) {
                        throw new Error('Файл должен содержать массив задач');
                    }

                    // Очищаем текущий список
                    taskList.innerHTML = '';

                    // Добавляем задачи из файла
                    tasks.forEach(task => {
                        // Проверяем структуру каждого элемента
                        if (task && typeof task.text === 'string' && typeof task.completed === 'boolean') {
                            const li = createTaskElement(task.text, task.completed);
                            taskList.appendChild(li);
                        } else {
                            console.warn('Некорректная задача пропущена:', task);
                        }
                    });

                    updateEmptyMessage();
                    alert('Задачи успешно загружены!');
                } catch (error) {
                    alert('Ошибка при чтении файла: ' + error.message);
                } finally {
                    // Сбрасываем input, чтобы можно было загрузить тот же файл повторно
                    importFile.value = '';
                }
            };
            reader.readAsText(file);
        });

        // Инициализация: показываем сообщение, если список пуст (так и есть)
        updateEmptyMessage();
    </script>
</body>
</html>
